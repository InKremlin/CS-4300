<!doctype html>
<html lang='en'>
  <head>
    <meta charset='utf-8'>
    <script src='main.js' type='module'></script>
    <link rel='shortcut icon' href='data:image/x-icon;,' type='image/x-icon'>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: Arial, sans-serif;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      #controls {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(255, 255, 255, 0.5);
        color: rgb(0, 0, 0);
        padding: 15px;
        border-radius: 5px;
        font-size: 14px;
      }
      .slider-group {
        margin-bottom: 10px;
      }
      label {
        display: inline-block;
        width: 60px;
      }
      input[type='range'] {
        width: 150px;
      }
      .value {
        display: inline-block;
        width: 60px;
        margin-left: 10px;
      }
      button {
        background: #0066cc;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
        margin-top: 10px;
        width: 100%;
      }
      button:hover {
        background: #00b928;
      }
    </style>
  </head>
  <body>
    <canvas></canvas>
    <div id="controls">
      <div class="slider-group">
        <label>Feed:</label>
        <input type="range" id="feedSlider" min="0" max="0.1" step="0.001" value="0.0545">
        <span class="value" id="feedValue">0.0545</span>
      </div>
      <div class="slider-group">
        <label>Kill:</label>
        <input type="range" id="killSlider" min="0" max="0.1" step="0.001" value="0.0620">
        <span class="value" id="killValue">0.0620</span>
      </div>
      <div class="slider-group">
        <label>DA:</label>
        <input type="range" id="daSlider" min="0" max="2" step="0.01" value="1.00">
        <span class="value" id="daValue">1.00</span>
      </div>
      <div class="slider-group">
        <label>DB:</label>
        <input type="range" id="dbSlider" min="0" max="2" step="0.01" value="0.50">
        <span class="value" id="dbValue">0.50</span>
      </div>
      <button id="resetButton">Reset Simulation</button>
    </div>
  </body>
</html>
